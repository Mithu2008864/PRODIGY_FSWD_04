<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Social Media Platform</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h2>My Social Media Platform</h2>

  <div class="header-right">
    <input type="text" placeholder="Search...">
    <button onclick="toggleDarkMode()" class="dark-btn">🌙</button>
  </div>
</div>

<!-- STORIES -->
<div class="stories">
  <div class="emoji-avatar">😎</div>
  <div class="emoji-avatar">🔥</div>
  <div class="emoji-avatar">🌸</div>
  <div class="emoji-avatar">🚀</div>
</div>

<!-- POST -->
<div class="post" data-id="1">

  <div class="post-header">
    <div class="emoji-avatar">😄</div>
    <strong>User One</strong>
  </div>

  <img class="post-img" src="https://picsum.photos/500/300">

  <div class="post-actions">
    <span class="like-btn" onclick="toggleLike(this)">❤️ Like</span>
    <span onclick="openComment()">💬 Comment</span>
    <span onclick="savePost(this)">🔖 Save</span>
  </div>

  <div class="caption">Beautiful moment 🌸</div>
</div>

<!-- POST 2 -->
<div class="post" data-id="2">

  <div class="post-header">
    <div class="emoji-avatar">🤩</div>
    <strong>User Two</strong>
  </div>

  <img class="post-img" src="https://picsum.photos/500/301">

  <div class="post-actions">
    <span class="like-btn" onclick="toggleLike(this)">❤️ Like</span>
    <span onclick="openComment()">💬 Comment</span>
    <span onclick="savePost(this)">🔖 Save</span>
  </div>

  <div class="caption">Enjoying life 😎</div>
</div>

<!-- FLOATING BUTTON -->
<button class="fab">+</button>

<!-- COMMENT POPUP -->
<div id="commentBox" class="modal">
  <div class="modal-content">
    <h3>Comments</h3>
    <textarea placeholder="Write a comment..."></textarea>
    <button onclick="closeComment()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
